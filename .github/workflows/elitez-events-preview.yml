name: Deploy ElitezEvents Preview

on:
  push:
    branches:
      - main
    paths:
      - 'ui-shell/**'
      - '.github/workflows/elitez-events-preview.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload UI shell artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui-shell

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report preview URL
        run: |
          echo "ElitezEvents no-secret preview URL:"
          echo "${{ steps.deployment.outputs.page_url }}"
